[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# This is overridden by env.py which reads DATABASE_URL from .env
# Leave as placeholder - actual URL comes from environment
sqlalchemy.url = postgresql+asyncpg://placeholder@localhost/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

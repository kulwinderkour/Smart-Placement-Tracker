services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend-api:
    build: ./backend-api
    ports:
      - '8000:8000'
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASS}@postgres/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}

    healthcheck:
      test: ['CMD-SHELL', "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-api:/app

  ai-engine:
    build: ./ai-engine
    ports:
      - "8002:8002"
    volumes:
      - ./ai-engine:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
      EXPRESS_BACKEND_URL: ${EXPRESS_BACKEND_URL}
    depends_on:
      postgres:
        condition: service_healthy

  collector:
    build: ./collector
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS}@postgres:5432/${DB_NAME}
      AI_ENGINE_URL: http://ai-engine:8002
      SCRAPE_INTERVAL_MINUTES: 60
      MAX_JOBS_PER_RUN: 100
    depends_on:
      postgres:
        condition: service_healthy
      backend-api:
        condition: service_healthy
      ai-engine:
        condition: service_started
    restart: unless-stopped

  node-scraper:
    build:
      context: ./backend-api
      dockerfile: Dockerfile.node
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-api

volumes:
  postgres_data:
